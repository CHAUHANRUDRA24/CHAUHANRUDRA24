<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analytics - CHAUHANRUDRA24</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff1493, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 0.95em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ff1493;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 105, 180, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
        }

        .stat-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff1493;
            margin: 10px 0;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 25px;
            color: #ff1493;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .lang-name {
            min-width: 100px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .lang-bar {
            flex: 1;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .lang-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff1493, #00bfff);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 105, 180, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .repo-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 105, 180, 0.5);
            transform: translateY(-3px);
        }

        .repo-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #00bfff;
            margin-bottom: 10px;
        }

        .repo-desc {
            color: #b0b0b0;
            font-size: 0.9em;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .repo-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #888;
        }

        .repo-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 105, 180, 0.2);
            color: #ff1493;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.5);
            color: #ff6b6b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9em;
        }

        .updated-time {
            color: #ff1493;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 GitHub Analytics Dashboard</h1>
            <p class="subtitle">Real-time statistics for CHAUHANRUDRA24</p>
        </header>

        <div id="error-container"></div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            ⏳ Loading your GitHub data...
        </div>

        <!-- Content (Hidden until loaded) -->
        <div id="content" style="display: none;">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-label">Total Stars</div>
                    <div class="stat-value" id="stat-stars">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-label">Repositories</div>
                    <div class="stat-value" id="stat-repos">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">🔀</div>
                    <div class="stat-label">Pull Requests</div>
                    <div class="stat-value" id="stat-prs">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">🐛</div>
                    <div class="stat-label">Issues</div>
                    <div class="stat-value" id="stat-issues">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-label">Followers</div>
                    <div class="stat-value" id="stat-followers">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">👀</div>
                    <div class="stat-label">Following</div>
                    <div class="stat-value" id="stat-following">0</div>
                </div>
            </div>

            <!-- Languages Section -->
            <div class="section">
                <h2>💻 Top Languages Used</h2>
                <div id="languages-container"></div>
            </div>

            <!-- Top Repositories Section -->
            <div class="section">
                <h2>📚 Top Repositories</h2>
                <div class="repo-grid" id="repos-container"></div>
            </div>
        </div>

        <div class="footer">
            Last updated: <span class="updated-time" id="update-time">Now</span>
        </div>
    </div>

    <script>
        const USERNAME = 'CHAUHANRUDRA24';
        const API_URL = 'https://api.github.com';

        async function fetchWithErrorHandling(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`GitHub API Error: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        async function getGitHubStats() {
            try {
                // Hide loading, show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // Fetch user data
                const userData = await fetchWithErrorHandling(`${API_URL}/users/${USERNAME}`);
                
                document.getElementById('stat-stars').textContent = userData.public_repos;
                document.getElementById('stat-repos').textContent = userData.public_repos;
                document.getElementById('stat-followers').textContent = userData.followers;
                document.getElementById('stat-following').textContent = userData.following;

                // Fetch user repos
                const repos = await fetchWithErrorHandling(
                    `${API_URL}/users/${USERNAME}/repos?sort=stars&direction=desc&per_page=100`
                );

                // Calculate stats
                let totalStars = 0;
                const languages = {};
                let prCount = 0;
                let issueCount = 0;

                // Process repos
                repos.forEach(repo => {
                    totalStars += repo.stargazers_count || 0;
                    if (repo.language) {
                        languages[repo.language] = (languages[repo.language] || 0) + 1;
                    }
                });

                // Fetch PRs and Issues
                try {
                    const searchPRs = await fetchWithErrorHandling(
                        `${API_URL}/search/issues?q=author:${USERNAME}+type:pr&per_page=1`
                    );
                    prCount = searchPRs.total_count || 0;
                } catch (e) {
                    console.log('PR count unavailable');
                }

                try {
                    const searchIssues = await fetchWithErrorHandling(
                        `${API_URL}/search/issues?q=author:${USERNAME}+type:issue&per_page=1`
                    );
                    issueCount = searchIssues.total_count || 0;
                } catch (e) {
                    console.log('Issue count unavailable');
                }

                // Update stats
                document.getElementById('stat-stars').textContent = totalStars.toLocaleString();
                document.getElementById('stat-prs').textContent = prCount.toLocaleString();
                document.getElementById('stat-issues').textContent = issueCount.toLocaleString();

                // Display languages
                displayLanguages(languages);

                // Display top repos
                displayRepos(repos.slice(0, 6));

                // Update timestamp
                updateTime();

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-container').innerHTML = 
                    `<div class="error">❌ Error loading GitHub data: ${error.message}<br>Please try refreshing the page.</div>`;
            }
        }

        function displayLanguages(languages) {
            const container = document.getElementById('languages-container');
            const sorted = Object.entries(languages)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            const maxCount = Math.max(...sorted.map(([_, count]) => count));

            container.innerHTML = sorted.map(([lang, count]) => {
                const percentage = (count / maxCount) * 100;
                return `
                    <div class="lang-item">
                        <div class="lang-name">${lang}</div>
                        <div class="lang-bar">
                            <div class="lang-fill" style="width: ${percentage}%">
                                ${count}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayRepos(repos) {
            const container = document.getElementById('repos-container');
            container.innerHTML = repos.map(repo => `
                <div class="repo-card">
                    <div class="repo-name">
                        <a href="${repo.html_url}" target="_blank" style="color: #00bfff; text-decoration: none;">
                            ${repo.name}
                        </a>
                    </div>
                    <div class="repo-desc">${repo.description || 'No description'}</div>
                    <div class="repo-meta">
                        <div class="repo-stat">⭐ ${repo.stargazers_count || 0}</div>
                        <div class="repo-stat">🍴 ${repo.forks_count || 0}</div>
                        ${repo.language ? `<span class="badge">${repo.language}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('update-time').textContent = timeString;
        }

        // Initial load
        getGitHubStats();

        // Refresh every 5 minutes
        setInterval(getGitHubStats, 5 * 60 * 1000);
        
        // Update time every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
