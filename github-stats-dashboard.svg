<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <clipPath id="bar-clip">
      <rect x="0" y="0" width="430" height="8" rx="4"/>
    </clipPath>
    <clipPath id="ring-clip">
      <circle cx="50" cy="50" r="38"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117" rx="0"/>

  <!-- ═══ LEFT CARD: GitHub Stats ═══ -->
  <rect x="12" y="12" width="390" height="188" rx="12" fill="#161b27"/>

  <!-- Card title -->
  <text x="28" y="40" font-size="14" fill="#8b9fc0" font-weight="500">Rudra Chauhan's GitHub Stats</text>

  <!-- Star row -->
  <text x="28" y="68" font-size="13" fill="#7dd3b0">☆  Total Stars Earned:</text>
  <text x="370" y="68" font-size="13" fill="#e0e6f0" text-anchor="end">0</text>

  <!-- Commits row -->
  <text x="28" y="92" font-size="13" fill="#7dd3b0">⏱  Total Commits:</text>
  <text x="370" y="92" font-size="13" fill="#e0e6f0" text-anchor="end">225</text>

  <!-- PRs row -->
  <text x="28" y="116" font-size="13" fill="#7dd3b0">↗  Total PRs:</text>
  <text x="370" y="116" font-size="13" fill="#e0e6f0" text-anchor="end">5</text>

  <!-- Issues row -->
  <text x="28" y="140" font-size="13" fill="#7dd3b0">⊙  Total Issues:</text>
  <text x="370" y="140" font-size="13" fill="#e0e6f0" text-anchor="end">1</text>

  <!-- Contributed row -->
  <text x="28" y="164" font-size="13" fill="#7dd3b0">⬡  Contributed to (last year):</text>
  <text x="370" y="164" font-size="13" fill="#e0e6f0" text-anchor="end">3</text>

  <!-- Grade circle -->
  <circle cx="355" cy="110" r="36" fill="none" stroke="#2a3050" stroke-width="4"/>
  <circle cx="355" cy="110" r="36" fill="none" stroke="#5b6fa8" stroke-width="4"
          stroke-dasharray="180 226" stroke-linecap="round" transform="rotate(-90 355 110)"/>
  <text x="355" y="116" font-size="18" fill="#7dd3b0" text-anchor="middle" font-weight="700">C</text>

  <!-- ═══ RIGHT CARD: Most Used Languages ═══ -->
  <rect x="416" y="12" width="472" height="188" rx="12" fill="#161b27"/>

  <!-- Title -->
  <text x="432" y="40" font-size="18" fill="#e0e6f0" font-weight="500">Most Used Languages</text>

  <!-- Language bar -->
  <g clip-path="url(#bar-clip)" transform="translate(432,56)">
    <rect x="0"   y="0" width="430" height="8" fill="#161b27"/>
    <!-- JS 39.52% = 170px -->
    <rect x="0"   y="0" width="170" height="8" fill="#F7DF1E"/>
    <!-- TS 36.06% = 155px -->
    <rect x="171" y="0" width="155" height="8" fill="#3178C6"/>
    <!-- HTML 16.86% = 72px -->
    <rect x="327" y="0" width="72"  height="8" fill="#E34F26"/>
    <!-- CSS 5.24% = 22px -->
    <rect x="400" y="0" width="22"  height="8" fill="#9B72D0"/>
    <!-- rest -->
    <rect x="423" y="0" width="7"   height="8" fill="#808080"/>
  </g>

  <!-- Language grid — col 1 -->
  <circle cx="443" cy="88"  r="6" fill="#F7DF1E"/>
  <text   x="455" y="93"  font-size="13" fill="#c0cce0">JavaScript 39.52%</text>

  <circle cx="443" cy="112" r="6" fill="#3178C6"/>
  <text   x="455" y="117" font-size="13" fill="#c0cce0">TypeScript 36.06%</text>

  <circle cx="443" cy="136" r="6" fill="#E34F26"/>
  <text   x="455" y="141" font-size="13" fill="#c0cce0">HTML 16.86%</text>

  <circle cx="443" cy="160" r="6" fill="#9B72D0"/>
  <text   x="455" y="165" font-size="13" fill="#c0cce0">CSS 5.24%</text>

  <!-- Language grid — col 2 -->
  <circle cx="660" cy="88"  r="6" fill="#F74D7B"/>
  <text   x="672" y="93"  font-size="13" fill="#c0cce0">C++ 1.36%</text>

  <circle cx="660" cy="112" r="6" fill="#6B8FA8"/>
  <text   x="672" y="117" font-size="13" fill="#c0cce0">Python 0.88%</text>

  <circle cx="660" cy="136" r="6" fill="#2496ED"/>
  <text   x="672" y="141" font-size="13" fill="#c0cce0">Dockerfile 0.05%</text>

  <circle cx="660" cy="160" r="6" fill="#808080"/>
  <text   x="672" y="165" font-size="13" fill="#c0cce0">C 0.04%</text>

  <!-- ═══ BOTTOM CARD: Streak Stats ═══ -->
  <rect x="12" y="214" width="876" height="194" rx="12" fill="#1e2235"/>

  <!-- Dividers -->
  <line x1="304" y1="240" x2="304" y2="388" stroke="#2a3050" stroke-width="1"/>
  <line x1="596" y1="240" x2="596" y2="388" stroke="#2a3050" stroke-width="1"/>

  <!-- LEFT: Total Contributions -->
  <text x="158" y="308" font-size="42" fill="#6eb5f5" font-weight="700" text-anchor="middle">41</text>
  <text x="158" y="338" font-size="13" fill="#6eb5f5" text-anchor="middle">Total Contributions</text>
  <text x="158" y="358" font-size="12" fill="#6b7fa0" text-anchor="middle">18 Jul 2025 - Present</text>

  <!-- CENTER: Week Streak ring -->
  <circle cx="450" cy="310" r="46" fill="none" stroke="#2a3060" stroke-width="5"/>
  <circle cx="450" cy="310" r="46" fill="none" stroke="#7c9ef5" stroke-width="5"
          stroke-dasharray="289" stroke-linecap="round" transform="rotate(-90 450 310)"/>
  <!-- fire emoji top -->
  <text x="450" y="272" font-size="18" text-anchor="middle">🔥</text>
  <!-- number -->
  <text x="450" y="322" font-size="38" fill="#c084fc" font-weight="700" text-anchor="middle">3</text>
  <text x="450" y="350" font-size="13" fill="#c084fc" font-weight="600" text-anchor="middle">Week Streak</text>
  <text x="450" y="370" font-size="12" fill="#6b7fa0" text-anchor="middle">24 May - 7 Jun</text>

  <!-- RIGHT: Longest Week Streak -->
  <text x="738" y="308" font-size="42" fill="#6eb5f5" font-weight="700" text-anchor="middle">4</text>
  <text x="738" y="338" font-size="13" fill="#6eb5f5" text-anchor="middle">Longest Week Streak</text>
  <text x="738" y="358" font-size="12" fill="#6b7fa0" text-anchor="middle">19 Apr - 10 May</text>
</svg>